<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" href="JobSeekProfileEdit.css">
</head>

<body>
    <header>
        <div class="profile-header">
            <div class="profile-img-container">
                <img id="profileImage" class="profile-img" src="" alt="profile image" />
                <span class="profile-img-placeholder" id="profileImgPlaceholder">profile image</span>
                <label for="profileImgInput" class="profile-img-pen">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="#2196f3" stroke="#fff" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round"
                        style="background: #fff; border-radius: 50%; padding: 4px; box-shadow: 0 2px 6px #0002; cursor: pointer;">
                        <circle cx="12" cy="12" r="12" fill="#fff" />
                        <path d="M12.5 6.5l5 5-8 8H4.5v-4.5z" />
                        <path d="M15.5 9.5l-1-1" />
                    </svg>
                </label>
                <input type="file" id="profileImgInput" accept="image/*" style="display:none" />
            </div>
            <h1 style="color: white;">My Profile - YXING</h1>
        </div>
    </header>
    <div class="container">
        <div id="successMessage" class="success-msg" style="display:none;">Profile successfully updated!</div>
        <section>
            <h2>About Me
                <button id="aboutMeEditBtn" class="aboutme-pen" title="Edit About Me"
                    style="background:none;border:none;cursor:pointer;vertical-align:middle;">
                    <svg id="aboutMePenIcon" width="20" height="20" viewBox="0 0 24 24" fill="#2196f3" stroke="#fff"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        style="background: #fff; border-radius: 50%; padding: 2px; box-shadow: 0 2px 6px #0002;">
                        <circle cx="12" cy="12" r="12" fill="#fff" />
                        <path d="M12.5 6.5l5 5-8 8H4.5v-4.5z" />
                        <path d="M15.5 9.5l-1-1" />
                    </svg>
                </button>
            </h2>
            <textarea id="aboutMeText" rows="3" style="width:100%;resize:vertical;" disabled></textarea>
        </section>
        <section>
            <h2>Location</h2>
            <select id="locationSelect" class="location-select" style="width:100%;max-width:400px;">
                <option value="" disabled selected hidden>Select your state</option>
                <option value="Johor">Johor</option>
                <option value="Kedah">Kedah</option>
                <option value="Kelantan">Kelantan</option>
                <option value="Melaka">Melaka</option>
                <option value="Negeri Sembilan">Negeri Sembilan</option>
                <option value="Pahang">Pahang</option>
                <option value="Penang">Penang</option>
                <option value="Perak">Perak</option>
                <option value="Perlis">Perlis</option>
                <option value="Sabah">Sabah</option>
                <option value="Sarawak">Sarawak</option>
                <option value="Selangor">Selangor</option>
                <option value="Terengganu">Terengganu</option>
                <option value="Kuala Lumpur">Kuala Lumpur</option>
                <option value="Labuan">Labuan</option>
                <option value="Putrajaya">Putrajaya</option>
            </select>
        </section>
        <div style="margin: 24px 0 0 0; text-align: left;">
            <button id="editProfileBtn" class="btn btn-warning" style="margin-bottom: 16px;" onclick="goEdit()">Edit
                Skills & Work Experiences</button>
        </div>
        <section>
            <h2>Skills</h2>
            <div id="no-skills-msg" style="color:#888;display:none;">No skill yet.</div>
            <ul id="view-skills"></ul>
        </section>
        <section>
            <h2>Work Experience</h2>
            <div id="no-exp-msg" style="color:#888;display:none;">No work experience yet.</div>
            <ul id="view-exp"></ul>
        </section>
    </div>
    <style>
        .success-msg {
            background-color: #4caf50;
            color: white;
            padding: 12px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .location-select {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #bdbdbd;
            background: #f8f9fa;
            font-size: 16px;
            color: #333;
            transition: border-color 0.2s;
        }

        .location-select:focus {
            border-color: #2196f3;
            outline: none;
            background: #fff;
        }

        .location-select option[disabled][selected][hidden] {
            color: #aaa;
        }

        .aboutme-pen svg {
            vertical-align: middle;
        }

        #aboutMeEditBtn {
            margin-left: 8px;
        }

        .profile-img-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-right: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            display: none;
            background: #ccc;
        }

        .profile-img-placeholder {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ccc;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            z-index: 1;
        }

        .profile-img-pen {
            position: absolute;
            bottom: 0;
            right: 0;
            z-index: 2;
            cursor: pointer;
        }
    </style>
    <script src="JobSeekProfile.js"></script>
</body>

</html>
