<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="JobSeekProfileEdit.css">
</head>

<body>
    <header>
        <h1>Edit Profile - YXING</h1>
    </header>
    <div class="container">
        <section class="skills">
            <h2>Skills</h2>
            <div class="input-group">
                <label for="skill-input">New skill</label>
                <input type="text" id="skill-input" placeholder="Add skill">
                <select id="skill-suggestion"
                    style="margin-top:8px;display:block;width:100%;padding:8px 10px;border-radius:6px;border:1px solid #ccc;font-size:15px;">
                    <option value="" disabled selected hidden>Skill Suggestion</option>
                    <option value="Python">Python</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="Java">Java</option>
                    <option value="C#">C#</option>
                    <option value="SQL">SQL</option>
                    <option value="HTML">HTML</option>
                    <option value="CSS">CSS</option>
                    <option value="React">React</option>
                    <option value="Node.js">Node.js</option>
                    <option value="PHP">PHP</option>
                    <option value="TypeScript">TypeScript</option>
                </select>
                <div id="skill-message"></div>
            </div>
            <button id="skill-action" onclick="addSkill()">Add</button>
            <ul id="skills-list"></ul>
        </section>
        <section class="experience">
            <h2>Work Experience</h2>
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" placeholder="Job title">
                <label for="company">Company</label>
                <input type="text" id="company" placeholder="Company name">
            </div>
            <div class="form-group">
                <label for="job-type">Job Type</label>
                <select id="job-type">
                    <option value="Full-time">Full-time</option>
                    <option value="Part-time">Part-time</option>
                </select>
            </div>
            <div class="form-group">
                <label for="start">Start</label>
                <input type="date" id="start" onkeydown="return false" onfocus="this.showPicker()">
                <label for="end">End</label>
                <div style="display:flex; flex-direction:column; width:100%; gap:5px;">
                    <input type="date" id="end" onkeydown="return false" onfocus="this.showPicker()">
                    <label
                        style="display:flex; align-items:center; gap:5px; font-weight:normal; font-size:14px; margin-top:5px; cursor:pointer;">
                        <input type="checkbox" id="until-present" style="width:auto; margin:0;"
                            onchange="toggleEndPicker()"> Until Present
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label for="desc">Description (Optional)</label>
                <textarea id="desc" placeholder="Description"></textarea>
            </div>
            <div id="exp-message"></div>
            <button id="exp-action" onclick="addExperience()">Add</button>
            <ul id="exp-list"></ul>
        </section>
        <button onclick="maybeSave()">Save Changes</button>
        <div id="message"></div>
    </div>

    <!-- confirmation dialog for incomplete edits -->
    <div id="confirm-dialog" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
         background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
        <div style="background:white; padding:20px; border-radius:8px; max-width:400px; margin:auto;">
            <p>Your edit is not yet complete. Are you sure you want to continue?</p>
            <label><input type="checkbox" id="dont-show-check"> Don't show again</label>
            <div style="margin-top:15px; text-align:right;">
                <button onclick="proceedConfirm()">Proceed</button>
                <button onclick="cancelConfirm()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="JobSeekProfileEdit.js"></script>
</body>

</html>
