<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="JobSeekProfileEdit.css">
</head>
<body>
    <header>
        <h1>Edit Profile</h1>
    </header>
    <div class="container">
        <section class="skills">
            <h2>Skills</h2>
            <div class="input-group">
                <label for="skill-input">New skill</label>
                <input type="text" id="skill-input" placeholder="Add skill">
                <button id="skill-action" onclick="addSkill()">Add</button>
            </div>
            <ul id="skills-list"></ul>
        </section>
        <section class="experience">
            <h2>Work Experience</h2>
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" placeholder="Job title">
                <label for="company">Company</label>
                <input type="text" id="company" placeholder="Company name">
            </div>
            <div class="form-group">
                <label for="start">Start</label>
                <input type="text" id="start" placeholder="YYYY-MM">
                <label for="end">End</label>
                <input type="text" id="end" placeholder="YYYY-MM or Present">
            </div>
            <div class="form-group">
                <label for="desc">Description</label>
                <textarea id="desc" placeholder="Description"></textarea>
            </div>
            <button id="exp-action" onclick="addExperience()">Add</button>
            <ul id="exp-list"></ul>
        </section>
        <button onclick="maybeSave()">Save Changes</button>
        <div id="message"></div>
    </div>

    <!-- confirmation dialog for incomplete edits -->
    <div id="confirm-dialog" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
         background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
        <div style="background:white; padding:20px; border-radius:8px; max-width:400px; margin:auto;">
            <p>Your edit is not yet complete. Are you sure you want to continue?</p>
            <label><input type="checkbox" id="dont-show-check"> Don't show again</label>
            <div style="margin-top:15px; text-align:right;">
                <button onclick="proceedConfirm()">Proceed</button>
                <button onclick="cancelConfirm()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="JobSeekProfileEdit.js"></script>
</body>
</html>
