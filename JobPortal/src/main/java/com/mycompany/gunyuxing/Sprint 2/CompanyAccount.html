<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Account - Job Portal</title>
    <link rel="stylesheet" href="CompanyAccount.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="header-container">
            <h1>Company Account</h1>
        </div>
    </header>

    <p style="font-size: 20pt; text-align: center; font-weight: bold;">
        This page only for testing purpose.</p>

    <div class="container">
        <div id="company-list" class="company-list">
            <!-- Company cards will be injected here -->
            <div class="no-records" id="no-records" style="display: none;">
                <i class="fas fa-building"></i>
                <p>No company records found.</p>
            </div>
        </div>

        <div class="actions">
            <button onclick="location.href='CompanyProfileCreate.html'" class="btn btn-primary btn-lg">
                <i class="fas fa-plus"></i> Add record
            </button>
        </div>
    </div>

    <script src="CompanyAccount.js"></script>
</body>

</html>
