<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Portal Demo - Apply Now</title>
  <link rel="stylesheet" href="jobportal.css">
</head>
<body>

  <h1>Job Portal Demo</h1>
  <p>Enter your profile below and click "Save Profile", then click "Apply Now" on any job.</p>

  <!-- Temporary Profile Input -->
  <div id="profileForm">
    <h2>Enter Your Profile</h2>
    <input type="text" id="name" placeholder="Name"><br><br>
    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="text" id="skills" placeholder="Skills (comma separated)"><br><br>
    <input type="number" id="experience" placeholder="Years of experience"><br><br>
    <button onclick="saveProfile()">Save Profile</button>
  </div>

  <!-- Job Listings -->
  <h2>Available Jobs</h2>
  <div id="results"></div>

  <!-- Message display -->
  <div id="message"></div>

  <!-- Dashboard to show applied jobs -->
  <div id="dashboard">
    <h2>My Applications</h2>
    <ul id="appliedJobs"></ul>
  </div>

  <!-- Employer view -->
  <h2>Employer View - Applicants</h2>
  <div id="employerView"></div>

  <script src="apply.js"></script>
</body>
</html>
