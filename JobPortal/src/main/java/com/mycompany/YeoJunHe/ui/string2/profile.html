<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Saved Jobs</title>
  <link rel="stylesheet" href="../jobportal.css">
</head>
<body>
  <!-- top fixed navigation for profile and avatar -->
  <nav class="top-nav">
    <div class="saved-wrapper">
      <a id="profileBtn" class="btn" title="View saved jobs" href="profile.html">🔖</a>
      <span id="savedCount" class="badge"></span>
    </div>
    <div class="avatar-wrap">
      <img id="avatarImg" src="data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='20' fill='%2307122a' stroke='%237c3aed' stroke-width='2'/%3E%3Ccircle cx='20' cy='15' r='6' fill='%237c3aed'/%3E%3Cpath d='M8 35c0-8 6-14 12-14s12 6 12 14' fill='%237c3aed'/%3E%3C/svg%3E" alt="avatar" class="avatar"/>
      <input type="file" id="avatarInput" accept="image/*" style="display:none;" />
      <label for="avatarInput" class="btn avatar-edit-btn" title="Change avatar">Edit</label>
    </div>
  </nav>
  <main class="container">
    <header class="hero header-flex">
      <div class="header-left">
        <h1>Saved Jobs</h1>
        <p class="subtitle">These are the positions you've bookmarked. Click to view details or remove them when you're ready.</p>
        <div style="margin-top:12px;display:flex;gap:8px;">
          <a href="../JobPortalPage.html" class="btn" style="font-size:14px;">Back to search</a>
          <button id="clearAllBtn" class="btn save" style="font-size:14px;">Clear all</button>
        </div>
      </div>
      <div class="header-right">
        <!-- moved to top-nav -->
      </div>
    </header>

    <section id="savedResults" class="results">
      <!-- saved job cards will appear here -->
    </section>
    <nav id="savedPagination" class="pagination" aria-label="Pagination">
    </nav>
  </main>

  <!-- reuse same detail modal from main portal -->
  <div id="detailModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button id="modalClose" class="modal-close" aria-label="Close description">×</button>
      <h2 id="modalTitle"></h2>
      <p id="modalMeta"></p>
      <p id="modalDescription"></p>
      <!-- save button hidden since removal is handled separately -->
      <button id="modalSave" class="btn save" style="display:none;"></button>
    </div>
  </div>

  <script src="../jobportal.js"></script>
  <script src="profile.js"></script>
</body>
</html>
