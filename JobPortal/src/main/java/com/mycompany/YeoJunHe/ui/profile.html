<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Saved Jobs - Job Portal</title>
  <link rel="stylesheet" href="jobportal.css">
</head>
<body>

  <nav class="top-nav">
    <div class="saved-wrapper">
      <a id="backBtn" class="btn" title="Back to job search" href="JobPortalPage.html">←</a>
      <span id="savedCount" class="badge"></span>
    </div>
    <div class="avatar-wrap">
      <img id="avatarImg" src="data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='20' fill='%2307122a' stroke='%237c3aed' stroke-width='2'/%3E%3Ccircle cx='20' cy='15' r='6' fill='%237c3aed'/%3E%3Cpath d='M8 35c0-8 6-14 12-14s12 6 12 14' fill='%237c3aed'/%3E%3C/svg%3E" alt="avatar" class="avatar"/>
      <input type="file" id="avatarInput" accept="image/*" style="display:none;" />
      <label for="avatarInput" class="btn avatar-edit-btn" title="Change avatar">Edit</label>
    </div>
  </nav>

  <main class="container">
    <header class="hero header-flex">
      <div class="header-left">
        <h1>Saved Jobs</h1>
        <p class="subtitle">These are the job posts you marked as interesting. You can remove them or go back to search for more.</p>
      </div>
      <div class="header-right"></div>
    </header>

    <section id="savedJobs" class="results"></section>

    <footer class="foot">
      <button id="clearBtn" class="btn remove">Clear all saved jobs</button>
    </footer>
  </main>

  <div id="detailModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button id="modalClose" class="modal-close" aria-label="Close description">×</button>
      <h2 id="modalTitle"></h2>
      <p id="modalMeta"></p>
      <p id="modalDescription"></p>
    </div>
  </div>

  <script src="profile.js"></script>
</body>
</html>
